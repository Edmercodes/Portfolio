<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Gallery</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #f4f8ff;
    }
    .header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.9rem 1rem;
      background: rgba(255,255,255,0.96);
      box-shadow: 0 1px 15px rgba(0,0,0,0.08);
    }
    .header a {
      color: var(--blue-4);
      text-decoration: none;
      font-weight: 700;
      margin-left: 1rem;
    }
    .iframe-wrap {
      margin-top: 70px;
      height: calc(100vh - 70px);
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <div>Admin Gallery</div>
    <div>
      <a href="../index.html">Home</a>
      <a href="../guest/">Guest View</a>
    </div>
  </div>
  <div class="iframe-wrap">
    <iframe src="../artworks.html?view=admin" title="Admin Artworks"></iframe>
  </div>
  <script>
    const role = localStorage.getItem('userRole') || 'guest';
    if (role !== 'admin') {
      window.location.href = '../guest/';
    }
  </script>
</body>
</html>
