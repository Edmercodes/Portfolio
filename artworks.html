<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artworks</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: var(--blue-1);
      margin: 0;
      padding: 2rem;
      text-align: center;
    }

    h2 {
      color: var(--blue-5);
      margin-bottom: 2rem;
    }

    .gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.5rem;
    }

    .gallery img {
      max-width: 100%;
      height: auto;
      max-height: 400px;
      border-radius: 8px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.15);
    }

    .back-button {
      display: inline-block;
      margin-top: 2rem;
      text-decoration: none;
      background-color: var(--blue-4);
      color: white;
      padding: 0.7rem 1.4rem;
      border-radius: 5px;
      font-weight: bold;
      transition: 0.3s;
    }

    .back-button:hover {
      background-color: var(--blue-5);
    }

    /* Modal styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.9);
      cursor: zoom-out;
    }

    .modal-content {
      max-width: 90%;
      max-height: 90vh;
      object-fit: contain;
      cursor: grab;
      position: absolute;
      top: 50%;
      left: 50%;
      margin: 0;
      padding: 0;
    }

    .modal-content.zoomed {
      cursor: grab;
    }

    .modal-content.dragging {
      cursor: grabbing;
    }

    .close {
      position: absolute;
      top: 15px;
      right: 35px;
      color: #f1f1f1;
      font-size: 40px;
      font-weight: bold;
      cursor: pointer;
      z-index: 1001;
    }

    .close:hover,
    .close:focus {
      color: #bbb;
      text-decoration: none;
    }

    /* Upload/Download controls */
    .controls {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      display: flex;
      gap: 10px;
    }

    .control-btn {
      background-color: var(--blue-4);
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .control-btn:hover {
      background-color: var(--blue-5);
    }

    #upload-input {
      display: none;
    }

    /* Dark Mode Styles */
    body.dark-mode {
      background-color: #1a1a1a;
      color: #ffffff;
    }

    body.dark-mode h2 {
      color: #64b5f6;
    }

    body.dark-mode .gallery img {
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.15);
    }

    body.dark-mode .image-container img {
      box-shadow: 0 0 10px rgba(100, 181, 246, 0.2);
    }

    body.dark-mode .control-btn {
      background-color: #333333;
      color: #ffffff;
    }

    body.dark-mode .control-btn:hover {
      background-color: #444444;
    }

    body.dark-mode .back-button {
      background-color: #333333;
    }

    body.dark-mode .back-button:hover {
      background-color: #444444;
    }

    body.dark-mode .modal {
      background-color: rgba(0, 0, 0, 0.95);
    }

    body.dark-mode .user-info {
      background-color: #333333;
    }

    body.dark-mode .delete-btn {
      background-color: rgba(255, 59, 48, 0.85);
    }

    /* User info bar */
    .user-info {
      position: fixed;
      top: 20px;
      left: 20px;
      background-color: var(--blue-4);
      color: white;
      padding: 10px 15px;
      border-radius: 5px;
      z-index: 100;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .user-info span {
      font-weight: bold;
    }

    .logout-btn {
      background-color: rgba(255, 255, 255, 0.3);
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 3px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .logout-btn:hover {
      background-color: rgba(255, 255, 255, 0.5);
    }

    /* Delete button for images */
    .delete-btn {
      background-color: rgba(255, 59, 48, 0.9) !important;
      color: white !important;
      font-size: 20px !important;
    }

    .delete-btn:hover {
      background-color: rgba(255, 0, 0, 0.9) !important;
    }
    .image-container {
  position: relative;
  display: inline-block;
}

.image-container img {
  display: block;
  border-radius: 8px;
}

/* Position delete button on top-left */
.delete-btn {
  position: absolute;
  top: 8px;
  left: 8px;
  background-color: rgba(255, 59, 48, 0.9);
  color: white;
  border: none;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  font-size: 16px;
  cursor: pointer;
  display: none;
}

/* Show button on hover only for admin */
.image-container.admin:hover .delete-btn {
  display: block;
}
  </style>
</head>
