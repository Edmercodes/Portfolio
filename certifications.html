<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certifications | Edmer Pino</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: var(--blue-1);
      font-family: 'Segoe UI', sans-serif;
    }

    .nav {
      background: linear-gradient(135deg, var(--blue-5), var(--blue-3));
      padding: 1rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
    }

    .nav a {
      text-decoration: none;
      background-color: white;
      color: var(--blue-4);
      padding: 0.6rem 1.2rem;
      border-radius: 5px;
      border: 2px solid var(--blue-4);
      transition: 0.3s;
      font-weight: 600;
      font-size: 1rem;
    }

    .nav a:hover {
      background-color: var(--blue-4);
      color: white;
    }

    .cert-container {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      max-width: 800px;
      margin: 2rem auto;
      animation: fadeIn 1s ease forwards;
      text-align: center;
    }

    .cert-container h2 {
      color: var(--blue-5);
      margin-bottom: 1.5rem;
      text-align: center;
      font-size: 1.8rem;
    }

    .view-btn {
      display: inline-block;
      background-color: var(--blue-4);
      color: white;
      padding: 0.7rem 1.4rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      margin: 0.6rem;
      transition: all 0.3s ease;
      box-shadow: 0 3px 6px rgba(0, 0, 0, 0.1);
    }

    .view-btn:hover {
      background-color: var(--blue-5);
      transform: translateY(-3px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
    }

    footer {
      text-align: center;
      padding: 1rem;
      background: var(--blue-4);
      color: white;
      margin-top: 2rem;
      box-shadow: 0 -3px 6px rgba(0, 0, 0, 0.1);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .nav {
        flex-direction: column;
        align-items: center;
      }
      .nav a {
        width: 100%;
        text-align: center;
      }
      .view-btn {
        width: 90%;
      }
    }
  </style>
</head>
<body>

    <a href="index.html">🏠 Home</a>
    <a href="education.html">Education</a>
    <a href="project.html">Project</a>
    <a href="skills.html">Skills</a>
    <a href="resume.html">Resume</a>
  </div>

  <section class="cert-container">

    <a href="diploma.html" class="view-btn">View Diploma</a>
    <a href="certapp.html" class="view-btn">Certificate Achievement</a>
    <a href="tor.html" class="view-btn">TOR</a>
    <a href="vgd.html" class="view-btn">Visual Graphic Design</a>
    <a href="logodesign.html" class="view-btn">Developing Designs for Logo</a>
    <a href="uidesign.html" class="view-btn">Developing Designs for UI</a>
  </section>
<script src="script.js"></script>
</body>
  <footer>
    &copy; 2025 Edmer John D. Pino. All rights reserved.
  </footer>
</html>
